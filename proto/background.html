			function drawPath(list){
				ctx.beginPath();

				ctx.arc(list[0]*spacing, list[1]*spacing, arcRadius, 0, Math.PI*2, false);
				ctx.moveTo(list[0]*spacing, list[1]*spacing);


				for(var i=2; i<list.length; i+=2)
					ctx.lineTo(list[i]*spacing, list[i+1]*spacing);


				ctx.arc(list[list.length-2]*spacing, list[list.length-1]*spacing, arcRadius, 0, Math.PI*2, false);

				ctx.stroke();


				ctx.beginPath();

				var saveW = ctx.lineWidth;
				var saveS = ctx.strokeStyle

				ctx.lineWidth = arcRadius/2;
				ctx.strokeStyle = ctx.fillStyle;

				ctx.moveTo(list[0]*spacing, list[1]*spacing);
				ctx.arc(list[0]*spacing, list[1]*spacing, ctx.lineWidth/2, 0, Math.PI*2, false);

				ctx.moveTo(list[list.length-2]*spacing, list[list.length-1]*spacing);
				ctx.arc(list[list.length-2]*spacing, list[list.length-1]*spacing, ctx.lineWidth/2, 0, Math.PI*2, false);

				ctx.stroke();

				ctx.lineWidth = saveW;
				ctx.strokeStyle = saveS;
			}


			function drawPart(list){
				ctx.beginPath();
				ctx.moveTo(list[0]*spacing, list[1]*spacing)

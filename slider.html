<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="description" content="portfolio">
	<meta name="author" content="tristan cardot">

	<title>portfolio tristan cardot</title>
	<style>
		@font-face {
			font-family: 'UbuntuMono';
			font-style: normal;
			font-weight: 400;
			src: local('UbuntuMono'), url(UbuntuMono.woff) format('woff');
		}
	
		body{
			font-family: 'UbuntuMono';
			margin: 0px;
			background-color: rgb(255,255,255);
			height: 100%;
			overflow-x:hidden;
		}

		canvas#canvas, div#container{
			position: fixed;
			top: 0px;
			left:0px;
			height: 100%;
			width: 100%;
		}
	</style>
	<style id="frameStyle">
		div.viewBox{
			position: absolute;
			overflow: hidden;
			height: 100%;
			width: 100%;

			box-shadow: inset 0px 0px 10px 2px black;
			transition: all 650ms ease-in;
		}

		div.viewBox>div{
			position: absolute;
			top: 0px;
			left: 0px;
			height: 100%;
			width: 100%;

			transition: all 650ms ease-in;
		}

		div.viewBox svg{
			position: absolute;
			top: -20%;
			left: -20%;
			height: 140%;
			width: 140%;
		}
		
		div.viewBox svg circle{
			fill: #ccc;
			stroke: #ccc;
		}
		
		div.viewBox svg path{
			fill: #ccc;
			stroke: #ccc;
			stroke-width: 1;
			stroke-linejoin: round;
			stroke-linecap: round;
		}
				
		div.viewBox.left{
			-webkit-transform: translateX(-100%);
			transform: translateX(-100%);
		}
		div.viewBox.left>div{
			-webkit-transform: translateX(66%);
			transform: translateX(66%);
		}
		div.viewBox.right{
			-webkit-transform: translateX(100%);
			transform: translateX(100%);
		}
		div.viewBox.right>div{
			-webkit-transform: translateX(-66%);
			transform: translateX(-66%);
		}
		
		div.viewBox.top{
			-webkit-transform: translateY(-100%);
			transform: translateY(-100%);
		}
		div.viewBox.top>div{
			-webkit-transform: translateY(66%);
			transform: translateY(66%);
		}
		
		div.viewBox.bottom{
			-webkit-transform: translateY(100%);
			transform: translateY(100%);
		}
		div.viewBox.bottom>div{
			-webkit-transform: translateY(-66%);
			transform: translateY(-66%);
		}
		
		div.viewBox.select{
			z-index: 1;
		}
		
		div.viewBox.slide{
			z-index: 2;
		}
		
		div.viewBox.hide{
			display: none;
		}
		
		div.nav{
			z-index:3;
			position:fixed;
			height: 50px;
			width: 50px;
			border: solid 5px white;
			background-image: url(img/iconNav.png);
			box-shadow: 0px 0px 2px black, inset 0px 0px 2px 2px black;
		}
		
		div.nav.top{
			margin-left: -30px;
			left: 50vw;
			top: -15px;
		}
		div.nav.bottom{
			margin-left: -30px;
			left: 50vw;
			bottom: -15px;
		}
		div.nav.left{
			margin-top: -30px;
			left: -15px;
			top: 50vh;
		}
		div.nav.right{
			margin-top: -30px;
			right: -15px;
			top: 50vh;
		}

		div#mediaWall{
			position: fixed;
			top:0px;
			left: 0px;
			height: 100%;
			width: 100%;
			background-color:rgba(0,0,0,.85);

			display: none;
			align-items: center;
			transition: opacity 500ms;
			z-index: 5;
		}

		div#mediaWall iframe{
			margin:auto;
			width: 90vmin;
			height: 52vmin;
		}
		
		div.mediaList{
			position: absolute;
			top:10%;
			left:10%;
			height:80%;
			width:80%;
			
			display: flex;
			flex-flow: row wrap;
			align-content: stretch;
		}
		
		div.mediaList>div{
			flex: 1 25%;
			margin:2.5%;
			background-size: 30vmax 30vmax;
			background-position: center;
			box-shadow: inset 0px 0px 35px 8px black;
		}
		
		div.mediaList>div>div{
			font-size: 1.5vmin;
			height: 20px;
			width: 100%;
			color: white;
			background-color: rgba(0,0,0,.75);
			text-align: center;
			padding: 5px 0px;
		}
		
	</style>
	<script>
		var lastFrame = Date.now();
		var updateList = [];
		function update(){
			var delta = Date.now() -lastFrame;
			lastFrame = Date.now();
	
			for(var i=0; i<updateList.length; i++)
				updateList[i].update(delta);
	
			requestAnimationFrame(update);
		}
		
		update();
		
		var menu = {
				updateSelected : function(){},
				HIDE : 1,
				SHOW : 2,
				TOP : 3
		};
	
	</script>
	<script id="frameScript">
		window.slider = {
			pos : {
				center : -150,
				top : -200,
				bottom : -100,
				left : -50,
				right : 0,
			},

			fromTo : {
				'left' : 'right',
				'top' : 'bottom',
				'right' : 'left',
				'bottom' : 'top'
			},

			slide : function( target){
				var node = document.getElementsByClassName( target)[0];
				if( node === undefined || this.active)
					return;

				this.active = true;
				node.className = node.className.replace( target, "slide");

				var fromTo = this.fromTo[target];
				var select = document.getElementsByClassName( 'select')[0];
				var move = document.getElementsByClassName( fromTo)[0];

				select.className += ' '+ fromTo;
				move.className = move.className.replace( fromTo, target +' hide');

				switch(this.pos[ target]){
					case 0:
						BGmusic.svg.unpauseAnimations();
						mediaDisplay.randomiseList('slideMusic');
					break;
					case -50:
						BGfilm.svg.unpauseAnimations();
						mediaDisplay.randomiseList('slideFilm');
					break;
					case -100:
						BGgame.svg.unpauseAnimations();
						mediaDisplay.randomiseList('slideGame');
						if( updateList.indexOf( BGgame) === -1)
							updateList.push( BGgame);
					break;
					case -150:
						menu.updateSelected( menu.TOP);
					break;
					case -200:
						//mediaDisplay.randomiseList('slideMusic');
				}

				setTimeout( function(self){
					node.className = node.className.replace( 'slide', 'select');
					select.className = select.className.replace( ' select', '');
					move.className = move.className.replace( ' hide', '');

					var fromPos = self.pos[ target];

					switch(self.pos.center){
						case 0:
							BGmusic.svg.pauseAnimations();
						break;
						case -50:
							BGfilm.svg.pauseAnimations();
						break;
						case -100:
							BGgame.svg.pauseAnimations();
							updateList.splice( updateList.indexOf( BGgame), 1);
						break;
						case -150:
							menu.updateSelected( menu.HIDE);
						break;
						case -200:
					}
					
					self.pos[ target] = self.pos[ fromTo];
					self.pos[ self.fromTo[ target] ] = self.pos.center;
					self.pos.center = fromPos;

					document.getElementsByClassName( 'nav '+ target)[0].style.backgroundPosition = self.pos[ target] +"px 0px";
					document.getElementsByClassName( 'nav '+ fromTo)[0].style.backgroundPosition = self.pos[ fromTo] +"px 0px";

					self.active = false;
				}, 750, this);
			}
		
		};
		
		window.nav = {
			from : {x:0, y:0},
			to : {x:0, y:0},
			pressed : false,
			press : function(){
				var self = this;
				
				var f = function(e){
					if( e.clientX === undefined){
						e.preventDefault();
						e = e.changedTouches[0];
					}

					self.to.x = self.from.x = e.clientX;
					self.to.y = self.from.y = e.clientY;
					self.pressed = true;
				};

				this.pressF = f;
				return f;
			},
			release : function(){
				var self = this;
				var f = function(e){
					if( !self.pressed)
						return;

					self.pressed = false;
					self.getSlide( self.to.x -self.from.x,  self.to.y -self.from.y);
				}

				this.releaseF = f;
				return f;
			},
			move : function(){
				var self = this;
				var f = function(e){
					if( e.clientX === undefined){
						e.preventDefault();
						e = e.changedTouches[0];
					}

					if( !self.pressed)
						return;

					self.to.x = e.clientX;
					self.to.y = e.clientY;

					self.getSlide( self.to.x -self.from.x,  self.to.y -self.from.y);
				}

				this.moveF = f;
				return f;
			},

			getSlide : function(offX, offY){
				if( Math.sqrt( offX *offX +offY *offY) < 150)
					return;

				this.pressed = false;
				var rad = Math.abs( Math.atan2( offY, offX) );

				if( rad < Math.PI/4)
					slider.slide('left');

				else if( rad < Math.PI/4*3)
					if( offY > 0)
						slider.slide('top');

					else
						slider.slide('bottom');

				else
					slider.slide('right');
			},
			
			addButtonEvent : function( className, target){
				var e = document.getElementsByClassName(className)[0];
				var f = function(){slider.slide(target);};

				e.addEventListener('click', f, false);
				e.addEventListener('touchstart', f, false);
			},
			
			bindSlideEvent : function(){
				var f = window.addEventListener;

				f('mousedown', nav.press(), false);
				f('mousemove', nav.move(), false);
				f('mouseup', nav.release(), false);

				f('touchstart', this.pressF, false);
				f('touchmove', this.moveF, false);
				f('touchend', this.releaseF, false);
			},
			
			clearSlide : function(){
				var f = window.removeEventListener;
				f('mousedown', this.pressF, false);
				f('mousemove', this.moveF, false);
				f('mouseup', this.releaseF, false);

				f('touchstart', this.pressF, false);
				f('touchmove', this.moveF, false);
				f('touchend', this.releaseF, false);
			}
		};

		window.BGgame = {
			init : function(){
				this.svg = document.getElementById('slideGame').getElementsByTagName('svg')[0];
				this.list = [];
				
				this.models = [
					"M0,0 v-15 h5 v-5 h5 v-5 h5 v-5 h-5 v-5 h5 v5 h5 v5 h15 v-5 h5 v-5 h5 v5 h-5 v5 h5 v5 h5 v5 h5 v15 h-5 v-10 h-5 v10 h-5 v5 h-10 v-5 h10 v-5 h-25 v5 h10 v5 h-10 v-5 h-5 v-10 h-5 v10 z m15,-15 h5 v-5 h-5 z m20,0 h5 v-5 h-5 z",
					"M0,0 v-15 h5 v10 h5 v-5 h5 v-5 h-5 v-5 h5 v5 h5 v5 h15 v-5 h5 v-5 h5 v5 h-5 v5 h5 v5 h5 v-10 h5 v15 h-5 v5 h-5 v10 h5 v5 h-5 v-5 h-5 v-5 h-25 v5 h-5 v5 h-5 v-5 h5 v-10 h-5 v-5 z m15,0 h5 v-5 h-5 z m20,0 h5 v-5 h-5 z",
					"M0,0 v-10 h5 v-5 h5 v-5 h5 v-5 h10 v5 h5 v5 h5 v5 h5 v10 h-10 v5 h-5 v-5 h-10 v5 h-5 v-5 z m0,10 h5 v-5 h5 v5 h5 v-5 h10 v5 h5 v-5 h5 v5 h5 v5 h-5 v-5 h-5 v5 h-5 v-5 h-10 v5 h-5 v-5 h-5 v5 h-5 z m10,-15 h5 v-5 h-5 z m15,0 h5 v-5 h-5 z"
				];
			},
			
			r : function(n){
				return Math.floor( Math.random() *n);
			},
			
			setA : function(node, values){
				for(var i=0; i<values.length; i+=2)
					node.setAttribute( values[i], values[i+1]);
			},

			currentTime : 0,
			lastSpawn : 0,
			
			update : function( delta){
				this.currentTime += delta;

				if(this.currentTime - this.lastSpawn > 1750){
					this.lastSpawn = this.currentTime;
					var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
					var animate = document.createElementNS('http://www.w3.org/2000/svg', 'animateTransform');

					var p = [
							path,				//path
							this.r(175),		//x
							this.currentTime
						];
					var abs = Math.abs( p[1] -this.lastX);

					if( abs < 60)
						if( p[1] < 85)
							p[1] += 60 +this.r(20) +abs;
						else
							p[1] -= 60 +this.r(20) +abs;
					
					this.lastX = p[1];

					path.setAttribute( 'd', this.models[ this.r(3)]);

					this.setA( animate, [
						'attributeName', 'transform',
						'attributeType', 'XML',
						'type', 'translate',
						'from', p[1] +" 225",
						'to', p[1] +" -25",
						'dur', ( Math.random() *1 +4) +"s",
						'begin', ( BGgame.svg.getCurrentTime()) +"s"
					]);
					
					path.appendChild( animate);
					this.svg.insertBefore( path, this.svg.firstChild);
					this.list.push( p);
				}

				for(var i=0; i<this.list.length; i++)
					if( this.currentTime -this.list[i][2] > 5000){
						this.svg.removeChild( this.list[i][0]);
						this.list.splice( i, 1);
						i--;
					}
			}
		};

		window.BGmusic = {
			init : function(){
				this.svg = document.getElementById('slideMusic').getElementsByTagName('svg')[0];

				for(var i=0, path,anim; i<8; i++){
					path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
					anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');

					this.setA(anim,[
					 'attributeType', 'XML',
					 'attributeName', 'd',
					 'from', 'M 165,165 Q155,155 165,165 Q165,165 165,165',
					 'to', 'M 0,165 Q0,0 165,0 Q0,0 0,165',
					 'dur', '8s',
					 'begin', '-'+ i +'s',
					 'repeatCount', 'indefinite'
					]);

					path.appendChild(anim);
					anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');

					this.setA(anim,[
					 'attributeType', 'CSS',
					 'attributeName', 'opacity',
					 'from', '1',
					 'to', '0',
					 'dur', '8s',
					 'begin', '-'+ i +'s',
					 'repeatCount', 'indefinite'
					]);

					path.appendChild(anim);
					this.svg.appendChild(path);
				}

				BGmusic.svg.pauseAnimations();
			},

			setA : function(node, values){
				for(var i=0; i<values.length; i+=2)
					node.setAttribute( values[i], values[i+1]);
			}
		};

		window.BGfilm = {
			init : function(){
				this.svg = document.getElementById('slideFilm').getElementsByTagName('svg')[0];
			}
		};

		

		window.mediaPlayer = {
			init : function(){
				this.wall = document.getElementById('mediaWall');

				this.wall.addEventListener('click', function(e){
					if(e.target !== this)
						return;

					var w = this;
					w.style.opacity = 0;

					setTimeout(function(){
						w.firstChild.src = '';
						w.style.display = 'none';
					}, 500);
					
				}, false);
			},

			launchVideo : function(data){
				this.wall.firstChild.src = 'http://www.youtube.com/embed/'+data+'?iv_load_policy=3&autoplay=1';
				this.wall.style.display = 'flex';
				this.wall.style.opacity = 1;
			}
		};
		
		window.onload = function(){
			BGgame.init();
			BGmusic.init();
			BGfilm.init();
			mediaPlayer.init();
			
			mediaDisplay.init();

			nav.bindSlideEvent();
			nav.addButtonEvent( 'nav top', 'top');
			nav.addButtonEvent( 'nav left', 'left');
			nav.addButtonEvent( 'nav right', 'right');
			nav.addButtonEvent( 'nav bottom', 'bottom');
			
			document.getElementById('container').style.opacity = 1;
		};

		window.clear = function(){
			nav.clearSlide();

			switch(slider.pos.center){
				case 0:
				break;
				case -50:
				break;
				case -100:
					updateList.splice( updateList.indexOf( BGgame), 1);
				break;
				case -150:
				break;
				case -200:
			}

			delete window.BGgame;
			delete window.BGmusic;
			delete window.BGfilm;
			delete window.slider;
			delete window.nav;
			delete window.mediaPlayer;
			delete window.mediaDisplay;

			var c = document.getElementById('container');
			while(c.childNodes.length !== 0)
				c.removeChild( c.childNodes[0]);
		};
		
		window.mediaDisplay = {
			init : function(){
				var dataS,node,i;
				
				for(key in this.data){
					this.randomiseList(key);
					
					var node = document.getElementById(key).getElementsByClassName('mediaList')[0].addEventListener('click',
						function(e){
							if(! e.target.dataset.code)
							return;

							mediaPlayer.launchVideo(e.target.dataset.code);

				}
			},

				}

				node.innerHTML = html;
			},

<body>
	<div id=container>
		<div id="slideHome" class="viewBox select">
			<div>
			</div>
		</div>
		<div id="slideMusic" class="viewBox right">
			<div>
				<svg viewBox="0 0 200 200">
					<path d='M126,166 h25 l8,8 l18,-18 l-8,-8 v-25 z'></path>
					
					<path> 
						<animate attributeType='XML' attributeName='d' from='M 165,165 Q155,155 165,165 Q165,165 165,165' to='M 0,165 Q0,0 165,0 Q0,0 0,165' dur='8s' begin='-2s' repeatCount='indefinite'/>
